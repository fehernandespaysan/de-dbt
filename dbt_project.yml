# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dpt_fundamentals'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

vars:
   target_db: GLUEDB
   target_schema: PUBLIC
   stage_name: GLUEDB.PUBLIC.GLUE_S3_STAGE

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
models:
  dpt_fundamentals: 
    
    # Configuration for the dbt_training folder
    # This will use your default connection database (ANALYTICS)
    dbt_training:
      +database: ANALYTICS
      staging:
        +materialized: view
      marts:
        +materialized: table

    # Configuration for the glue_project folder
    # This overrides the database to ensure it writes to GLUEDB
    glue_project:
      +database: GLUEDB
      raw:
        +materialized: table
        +schema: raw
      transform:
        +materialized: table
        +schema: transform
      # Matched to your folder name 'mart' from the file explorer
      mart:
        +materialized: table
        +schema: mart