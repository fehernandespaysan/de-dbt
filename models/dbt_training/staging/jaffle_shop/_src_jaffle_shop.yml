sources:
  - name: jaffle_shop
    database: raw  
    schema: jaffle_shop
    config:
          freshness:
            warn_after:
              count: 1
              period: day
            error_after:
              count: 5
              period: day
          loaded_at_field: _etl_loaded_at
    tables:
      - name: customers
        columns:
          - name: id
            description: primary Key for customer data
            data_tests:
              - unique
              - not_null
        config:
          freshness: null
      - name: orders
        columns:
          - name: id
            data_tests:
              - unique
              - not_null