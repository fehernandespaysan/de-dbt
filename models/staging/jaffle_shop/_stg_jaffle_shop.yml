models:
  - name: stg_jaffle_shop__customers
    description: unique list of customers
    columns:
      - name: customer_id
        description: primary key
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    description: list of distinct orders
    columns:
      - name: order_id
        description: primary key
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
      - name: customer_id
        data_tests:
          - relationships:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
